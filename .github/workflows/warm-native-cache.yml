name: Warm release native cache

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/warm-native-cache.yml'
      - 'scripts/build-semantic-native.sh'
      - 'patches/crispembed-bone-mmap.patch'
  workflow_dispatch:

permissions: {}

concurrency:
  group: warm-release-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-semantic-native:
    name: Semantic native (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-x64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: win32-x64
            runner: windows-2022
          - target: win32-arm64
            runner: windows-2022
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Restore semantic native runtime
        id: semantic-native-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: packages/coding-agent/native/${{ matrix.target }}
          key: semantic-native-v3-bun-ffi-${{ matrix.target }}-${{ hashFiles('scripts/build-semantic-native.sh', 'patches/crispembed-bone-mmap.patch') }}

      - name: Build semantic native libraries
        if: steps.semantic-native-cache.outputs.cache-hit != 'true'
        shell: bash
        run: ./scripts/build-semantic-native.sh ${{ matrix.target }}

      - name: Verify semantic native runtime
        shell: bash
        run: bun scripts/verify-semantic-native.mjs --root packages/coding-agent/native --target ${{ matrix.target }}
