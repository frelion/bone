name: Warm release native cache

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/warm-native-cache.yml'
      - 'scripts/build-semantic-native.sh'
      - 'packages/coding-agent/native/CMakeLists.txt'
      - 'packages/coding-agent/native/bone-embed-addon.cpp'
      - 'patches/crispembed-bone-mmap.patch'
  workflow_dispatch:

permissions: {}

concurrency:
  group: warm-release-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-semantic-native:
    name: Semantic native (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-x64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: win32-x64
            runner: windows-2022
          - target: win32-arm64
            runner: windows-2022
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Restore semantic native runtime
        id: semantic-native-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: packages/coding-agent/native/${{ matrix.target }}
          key: semantic-native-v2-node22-${{ matrix.target }}-${{ hashFiles('scripts/build-semantic-native.sh', 'packages/coding-agent/native/CMakeLists.txt', 'packages/coding-agent/native/bone-embed-addon.cpp', 'patches/crispembed-bone-mmap.patch') }}

      - name: Setup Node.js headers
        if: steps.semantic-native-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Download Windows Node-API headers and library
        if: steps.semantic-native-cache.outputs.cache-hit != 'true' && startsWith(matrix.target, 'win32-')
        shell: pwsh
        run: |
          $version = node -p "process.versions.node"
          $arch = if ("${{ matrix.target }}" -eq "win32-arm64") { "arm64" } else { "x64" }
          $headersArchive = "node-v$version-headers.tar.gz"
          $headersDownload = Join-Path $env:RUNNER_TEMP $headersArchive
          $headersDestination = Join-Path $env:RUNNER_TEMP "node-headers"
          $nodeLibrary = Join-Path $env:RUNNER_TEMP "node-$arch.lib"
          Invoke-WebRequest "https://nodejs.org/dist/v$version/$headersArchive" -OutFile $headersDownload
          Invoke-WebRequest "https://nodejs.org/dist/v$version/win-$arch/node.lib" -OutFile $nodeLibrary
          New-Item -ItemType Directory -Path $headersDestination | Out-Null
          tar -xzf $headersDownload -C $headersDestination
          $headersHome = Join-Path $headersDestination "node-v$version"
          Add-Content $env:GITHUB_ENV "BONE_NODE_API_INCLUDE_DIR=$(Join-Path $headersHome 'include\node')"
          Add-Content $env:GITHUB_ENV "BONE_NODE_LIBRARY=$nodeLibrary"

      - name: Build semantic native addon
        if: steps.semantic-native-cache.outputs.cache-hit != 'true'
        shell: bash
        run: ./scripts/build-semantic-native.sh ${{ matrix.target }}

      - name: Verify semantic native runtime
        shell: bash
        run: node scripts/verify-semantic-native.mjs --root packages/coding-agent/native --target ${{ matrix.target }}
